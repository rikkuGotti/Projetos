<!doctype html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manipulando o DOM - Alterando CSS</title>
    <style>
        body {
            background-color: #f0f0f0;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
        }

        .card {
            background-color: #ffffff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            max-width: 600px;
            width: 100%;
            text-align: center;
        }

        h1 {
            margin-bottom: 20px;
            color: #333;
        }

        .azul {
            color: white;
            background-color: #0b72b9;
            padding: 16px;
            border-radius: 10px;
            border-bottom: 5px solid #063b63;
        }

        button {
            margin: 8px;
            padding: 10px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
        }

        .botao-inline {
            background-color: #ff9800;
            color: white;
        }

        .botao-limpar {
            background-color: #f44336;
            color: white;
        }

        button:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <main class="card">
        <h1>Exemplo 03 - Alterando CSS com JavaScript</h1>

        <button class="botao-inline" onclick="alterarEstiloDireto()">
            Alterar estilo direto inline
        </button>

        <button onclick="aplicarClasse()">
            Aplicar classe azul
        </button>

        <button class="botao-limpar" onclick="removerInline()">
            Remover apenas inline
        </button>

        <button onclick="removerTudo()">
            Remover tudo
        </button>
    </main>

    <script>
        let titulo = document.querySelector('h1');

        function alterarEstiloDireto() {
            titulo.style.color = 'red';
            titulo.style.backgroundColor = '#000';
            titulo.style.padding = '16px';
            titulo.style.borderBottom = 'solid 4px red';
        }

        function aplicarClasse() {
            titulo.setAttribute('class', 'azul');
        }

        function removerInline() {
            titulo.removeAttribute('style');
        }

        function removerTudo() {
            titulo.removeAttribute('class');
            titulo.removeAttribute('style');
        }
    </script>
</body>
</html>
